<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizClaw AI Operator Login</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07110b;
      --panel: rgba(10, 28, 18, 0.88);
      --border: rgba(68, 104, 82, 0.45);
      --text: #f4f8f4;
      --muted: #a4b5a8;
      --accent: #16a34a;
      --accent-strong: #22c55e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.14), transparent 28%),
        linear-gradient(180deg, #061009, var(--bg));
      padding: 24px;
    }

    .card {
      width: min(460px, 100%);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: rgba(22, 163, 74, 0.12);
      color: #86efac;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.05;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.7;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      margin-bottom: 16px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #041008;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }

    .error {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(220, 38, 38, 0.16);
      color: #fecaca;
      font-size: 14px;
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">BizClaw AI Operator Panel</div>
    <h1>Bizgenix Admin</h1>
    <p>Manage client installs, health, billing, and notes from one operator dashboard.</p>
    <div class="error" id="error"></div>
    <form id="login-form">
      <label for="password">Admin password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Log In</button>
    </form>
    <div class="hint">Set `BIZCLAW_ADMIN_PASSWORD_HASH` in the environment before first use. `admin/config.json` is now config-only.</div>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorBox.style.display = "none";

      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());

      const response = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        errorBox.textContent = data.error || "Login failed.";
        errorBox.style.display = "block";
        return;
      }

      window.location.href = "/";
    });
  </script>
</body>
</html>
