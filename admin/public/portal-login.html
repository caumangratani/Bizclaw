<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizClaw Client Portal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1A1A2E;
      --panel: #16213E;
      --panel-2: #0F3460;
      --border: rgba(233, 69, 96, 0.3);
      --text: #FFFFFF;
      --muted: #A0A0B0;
      --accent: #E94560;
      --accent-soft: rgba(233, 69, 96, 0.15);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(233, 69, 96, 0.12), transparent 40%),
        linear-gradient(180deg, #1A1A2E, #0F0F1A);
      padding: 24px;
    }

    .card {
      width: min(460px, 100%);
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), #FF6B6B);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .logo-text {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 700;
    }

    .logo-text span {
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 28px;
      font-size: 15px;
      line-height: 1.6;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 700;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      margin-bottom: 16px;
      font-size: 15px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #FF6B6B);
      color: white;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(233, 69, 96, 0.35);
    }

    button:active {
      transform: translateY(0);
    }

    .error {
      display: none;
      margin-bottom: 16px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FCA5A5;
      font-size: 14px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .help-text {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 20px;
      line-height: 1.6;
    }

    .powered {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
    }

    .powered strong {
      color: var(--accent);
    }

    @media (max-width: 480px) {
      .card { padding: 24px; }
      .logo-text { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">
      <div class="logo-icon">BC</div>
      <div class="logo-text">Biz<span>Claw</span></div>
    </div>

    <h1>Client Portal</h1>
    <p class="subtitle">Access your business dashboard, manage approvals, and track your AI assistant's performance.</p>

    <div class="error" id="error"></div>

    <form id="login-form">
      <label for="clientId">Client ID</label>
      <input id="clientId" name="clientId" type="text" placeholder="e.g. acme-corp" autocomplete="username" required>

      <label for="token">Portal Token</label>
      <input id="token" name="token" type="password" placeholder="Your unique access token" autocomplete="current-password" required>

      <button type="submit" id="submit-btn">Access Portal</button>
    </form>

    <div class="powered">
      Powered by <strong>Bizgenix AI Solutions</strong>
    </div>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorBox.style.display = "none";
      submitBtn.textContent = "Authenticating...";
      submitBtn.disabled = true;

      const payload = {
        clientId: document.getElementById("clientId").value.trim(),
        token: document.getElementById("token").value.trim()
      };

      try {
        const response = await fetch("/api/portal/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          errorBox.textContent = data.error || "Invalid credentials. Please check your Client ID and Portal Token.";
          errorBox.style.display = "block";
          submitBtn.textContent = "Access Portal";
          submitBtn.disabled = false;
          return;
        }

        window.location.href = "/portal";
      } catch (err) {
        errorBox.textContent = "Connection error. Please try again.";
        errorBox.style.display = "block";
        submitBtn.textContent = "Access Portal";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
