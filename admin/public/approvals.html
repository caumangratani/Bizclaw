<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Approval Queue — BizClaw</title>
  <style>
    :root {
      --primary: #1A1A2E;
      --secondary: #16213E;
      --accent: #E94560;
      --gold: #F5A623;
      --success: #25D366;
      --danger: #dc2626;
      --warning: #f59e0b;
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --text: #2D2D2D;
      --text-muted: #6C757D;
      --border: #E5E7EB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 240px; background: var(--primary); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-logo h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .sidebar-logo span { font-size: 11px; color: rgba(255,255,255,0.5); display: block; margin-top: 2px; }
    .sidebar nav { flex: 1; padding: 16px 0; }
    .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; transition: all 0.15s; }
    .sidebar nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .sidebar nav a.active { background: rgba(233,69,96,0.15); color: #fff; border-left: 3px solid var(--accent); padding-left: 17px; }
    .sidebar nav a .badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 999px; min-width: 20px; text-align: center; }
    .sidebar nav a .badge.zero { background: rgba(255,255,255,0.15); }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: rgba(255,255,255,0.4); }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; gap: 16px; }
    .topbar h2 { font-size: 20px; font-weight: 600; }
    .topbar .subtitle { font-size: 13px; color: var(--text-muted); }

    /* Filters */
    .filters { padding: 16px 28px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); font-size: 13px; cursor: pointer; transition: all 0.15s; color: var(--text-muted); }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .filter-select { padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--surface); cursor: pointer; }

    /* Queue */
    .queue { flex: 1; overflow-y: auto; padding: 0 28px 28px; }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty svg { width: 64px; height: 64px; margin: 0 auto 16px; display: block; opacity: 0.3; }
    .empty h3 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; transition: box-shadow 0.15s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .card-header { padding: 14px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .card-header .client-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--secondary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .card-header .client-info { flex: 1; }
    .card-header .client-name { font-weight: 600; font-size: 14px; }
    .card-header .client-meta { font-size: 12px; color: var(--text-muted); }
    .card-body { padding: 14px 18px; }
    .card-body .action-label { font-size: 15px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .card-body .action-detail { font-size: 13px; color: var(--text-muted); line-height: 1.5; background: var(--bg); border-radius: 6px; padding: 10px 12px; margin-bottom: 10px; }
    .card-footer { padding: 10px 18px 14px; display: flex; align-items: center; gap: 8px; }

    /* Badges */
    .badge-risk-low { background: #dcfce7; color: #15803d; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-risk-medium { background: #fef9c3; color: #854d0e; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-risk-high { background: #fee2e2; color: #dc2626; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-status-pending { background: #dbeafe; color: #1d4ed8; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-status-approved { background: #dcfce7; color: #15803d; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-status-denied { background: #fee2e2; color: #dc2626; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-status-expired { background: #f3f4f6; color: #6b7280; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }

    /* Buttons */
    .btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-approve { background: var(--success); color: #fff; }
    .btn-approve:hover { background: #1da851; }
    .btn-deny { background: #fee2e2; color: var(--danger); }
    .btn-deny:hover { background: #fecaca; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .time-ago { font-size: 12px; color: var(--text-muted); margin-left: auto; }
    .resolved-info { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    /* Deny Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 16px; padding: 28px; width: 100%; max-width: 440px; }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .modal label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
    .modal textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; resize: vertical; min-height: 80px; margin-bottom: 16px; font-family: inherit; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel { background: var(--bg); color: var(--text); border: 1px solid var(--border); }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 200; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-logo h1, .sidebar-logo span, .sidebar nav a span, .sidebar-footer { display: none; }
      .sidebar nav a { justify-content: center; padding: 12px; }
      .topbar { padding: 12px 16px; }
      .filters { padding: 12px 16px; }
      .queue { padding: 0 16px 16px; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>BizClaw</h1>
    <span>Powered by Bizgenix</span>
  </div>
  <nav>
    <a href="/"><span>Dashboard</span></a>
    <a href="/client/"><span>Clients</span></a>
    <a href="/approvals" class="active"><span>Approvals</span><span id="sidebar-badge" class="badge zero">0</span></a>
    <a href="/api/logout"><span>Logout</span></a>
  </nav>
  <div class="sidebar-footer">Bizgenix Admin v1.0</div>
</aside>

<!-- Main -->
<main class="main">
  <div class="topbar">
    <h2>Approval Queue</h2>
    <span class="subtitle">Review and approve pending agent actions</span>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="approved">Approved</button>
    <button class="filter-btn" data-filter="denied">Denied</button>
    <button class="filter-btn" data-filter="expired">Expired</button>
    <select class="filter-select" id="client-filter">
      <option value="">All Clients</option>
    </select>
  </div>

  <div class="queue" id="queue-container">
    <div class="empty" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      <h3>All caught up!</h3>
      <p>No pending approvals right now.</p>
    </div>
  </div>
</main>

<!-- Deny Modal -->
<div class="modal-overlay" id="deny-modal">
  <div class="modal">
    <h3>Deny Action</h3>
    <p>This action will be blocked. The agent will be notified with your reason.</p>
    <label for="deny-reason">Reason for denial (required)</label>
    <textarea id="deny-reason" placeholder="e.g., This vendor is not verified. Please confirm via phone first."></textarea>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeDenyModal()">Cancel</button>
      <button class="btn btn-deny" onclick="confirmDeny()">Deny Action</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const ACTION_LABELS = {
  send_external_email: "Send External Email",
  initiate_payment: "Initiate Payment",
  send_whatsapp_to_unregistered: "Send WhatsApp to Unregistered Number",
  modify_tally_voucher: "Modify Tally Voucher",
  access_gst_with_credentials: "Access GST Portal with Credentials",
  create_google_calendar_event: "Create Google Calendar Event",
  send_email_to_new_recipient: "Send Email to New Recipient",
  default: "Agent Action"
};

const RISK_COLORS = { low: "badge-risk-low", medium: "badge-risk-medium", high: "badge-risk-high" };
const STATUS_BADGES = { pending: "badge-status-pending", approved: "badge-status-approved", denied: "badge-status-denied", expired: "badge-status-expired" };

let currentFilter = "all";
let currentClientFilter = "";
let pendingDenyId = null;
let pollInterval = null;

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { "Content-Type": "application/json", ...opts.headers },
    ...opts
  });
  if (res.status === 401) { window.location.href = "/login"; return null; }
  return res.json();
}

async function loadApprovals() {
  const [pending, history] = await Promise.all([
    api("/api/approvals"),
    api("/api/approvals/history")
  ]);

  if (!pending || !history) return;

  // Update badge
  const count = pending.length;
  const badge = document.getElementById("sidebar-badge");
  badge.textContent = count;
  badge.className = count > 0 ? "badge" : "badge zero";

  // Populate client filter
  const clientSet = new Set();
  [...pending, ...history].forEach(a => clientSet.add(a.clientId));
  const select = document.getElementById("client-filter");
  if (select.options.length <= 1) {
    [...clientSet].sort().forEach(cid => {
      const opt = document.createElement("option");
      opt.value = cid;
      opt.textContent = cid;
      select.appendChild(opt);
    });
  }

  // Filter
  let items = [...pending, ...history];
  if (currentFilter !== "all") items = items.filter(a => a.status === currentFilter);
  if (currentClientFilter) items = items.filter(a => a.clientId === currentClientFilter);

  renderQueue(items);
}

function renderQueue(items) {
  const container = document.getElementById("queue-container");
  const empty = document.getElementById("empty-state");

  if (items.length === 0) {
    empty.style.display = "block";
    container.querySelectorAll(".card").forEach(el => el.remove());
    return;
  }

  empty.style.display = "none";
  container.querySelectorAll(".card").forEach(el => el.remove());

  // Sort: pending first, then by requestedAt desc
  items.sort((a, b) => {
    if (a.status === "pending" && b.status !== "pending") return -1;
    if (a.status !== "pending" && b.status === "pending") return 1;
    return new Date(b.requestedAt) - new Date(a.requestedAt);
  });

  items.forEach(item => {
    const card = createCard(item);
    container.appendChild(card);
  });
}

function createCard(item) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id = item.id;

  const label = ACTION_LABELS[item.action] || item.action || ACTION_LABELS.default;
  const initials = (item.clientId || "BC").slice(0, 2).toUpperCase();
  const timeAgo = timeAgoStr(item.requestedAt);
  const riskClass = RISK_COLORS[item.risk] || RISK_COLORS.medium;
  const statusBadge = STATUS_BADGES[item.status] || "";

  card.innerHTML = `
    <div class="card-header">
      <div class="client-avatar">${initials}</div>
      <div class="client-info">
        <div class="client-name">${escapeHtml(item.clientId)}</div>
        <div class="client-meta">${escapeHtml(item.requestedBy || "Agent")} · ${timeAgo}</div>
      </div>
      ${item.status === "pending" ? `<span class="${riskClass}">${(item.risk || "medium").toUpperCase()} RISK</span>` : `<span class="${statusBadge}">${item.status.toUpperCase()}</span>`}
    </div>
    <div class="card-body">
      <div class="action-label">
        ${escapeHtml(label)}
      </div>
      <div class="action-detail">${escapeHtml(item.details || "No additional details provided.")}</div>
    </div>
    <div class="card-footer">
      ${item.status === "pending" ? `
        <button class="btn btn-approve btn-sm" onclick="approve('${item.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
          Approve
        </button>
        <button class="btn btn-deny btn-sm" onclick="openDenyModal('${item.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 18L18 6M6 6l12 12"/></svg>
          Deny
        </button>
        <span class="time-ago">${timeAgo}</span>
      ` : `
        <span style="font-size:12px;color:var(--text-muted)">${item.status === "denied" && item.denyReason ? `Reason: ${escapeHtml(item.denyReason)}` : ""}</span>
        <span class="resolved-info">${item.status === "approved" ? `Approved by ${escapeHtml(item.approver || "Admin")}` : item.status === "denied" ? `Denied by ${escapeHtml(item.approver || "Admin")}` : "Auto-expired"} · ${timeAgoStr(item.resolvedAt || item.requestedAt)}</span>
      `}
    </div>
  `;

  return card;
}

function timeAgoStr(isoStr) {
  if (!isoStr) return "";
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function escapeHtml(str) {
  if (!str) return "";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function approve(id) {
  const res = await api(`/api/approvals/${id}/approve`, { method: "POST" });
  if (res) {
    showToast("Action approved", "success");
    loadApprovals();
  }
}

function openDenyModal(id) {
  pendingDenyId = id;
  document.getElementById("deny-reason").value = "";
  document.getElementById("deny-modal").classList.add("open");
}

function closeDenyModal() {
  document.getElementById("deny-modal").classList.remove("open");
  pendingDenyId = null;
}

async function confirmDeny() {
  const reason = document.getElementById("deny-reason").value.trim();
  if (!reason) {
    showToast("Please provide a reason for denial", "error");
    return;
  }
  const res = await api(`/api/approvals/${pendingDenyId}/deny`, {
    method: "POST",
    body: JSON.stringify({ reason })
  });
  if (res) {
    closeDenyModal();
    showToast("Action denied", "error");
    loadApprovals();
  }
}

function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove("show"), 3000);
}

// Filter buttons
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    loadApprovals();
  });
});

document.getElementById("client-filter").addEventListener("change", e => {
  currentClientFilter = e.target.value;
  loadApprovals();
});

// Modal backdrop click
document.getElementById("deny-modal").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeDenyModal();
});

// Init
loadApprovals();
pollInterval = setInterval(loadApprovals, 5000);
</script>
</body>
</html>
